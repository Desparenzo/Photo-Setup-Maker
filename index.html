<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pro Photo Layout</title>
  
  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- React & ReactDOM -->
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  
  <!-- Babel to compile JSX in the browser -->
  <script src="https://unpkg.com/@babel/standalone@7/babel.min.js"></script>

  <style>
    /* Custom utility to hide scrollbars as used in the original component */
    .no-scrollbar::-webkit-scrollbar {
      display: none;
    }
    .no-scrollbar {
      -ms-overflow-style: none;  /* IE and Edge */
      scrollbar-width: none;  /* Firefox */
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    // --- Inline Icon Components (Replacing lucide-react) ---
    const Trash2 = ({ className }) => (<svg className={className} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M3 6h18"/><path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6"/><path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"/><line x1="10" x2="10" y1="11" y2="17"/><line x1="14" x2="14" y1="11" y2="17"/></svg>);
    const Settings = ({ className }) => (<svg className={className} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M12.22 2h-.44a2 2 0 0 0-2 2v.18a2 2 0 0 1-1 1.73l-.43.25a2 2 0 0 1-2 0l-.15-.08a2 2 0 0 0-2.73.73l-.22.38a2 2 0 0 0 .73 2.73l.15.1a2 2 0 0 1 1 1.72v.51a2 2 0 0 1-1 1.74l-.15.09a2 2 0 0 0-.73 2.73l.22.38a2 2 0 0 0 2.73.73l.15-.08a2 2 0 0 1 2 0l.43.25a2 2 0 0 1 1 1.73V20a2 2 0 0 0 2 2h.44a2 2 0 0 0 2-2v-.18a2 2 0 0 1 1-1.73l.43-.25a2 2 0 0 1 2 0l.15.08a2 2 0 0 0 2.73-.73l.22-.39a2 2 0 0 0-.73-2.73l-.15-.08a2 2 0 0 1-1-1.74v-.5a2 2 0 0 1 1-1.74l.15-.09a2 2 0 0 0 .73-2.73l-.22-.38a2 2 0 0 0-2.73-.73l-.15.08a2 2 0 0 1-2 0l-.43-.25a2 2 0 0 1-1-1.73V4a2 2 0 0 0-2-2z"/><circle cx="12" cy="12" r="3"/></svg>);
    const Plus = ({ className }) => (<svg className={className} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M5 12h14"/><path d="M12 5v14"/></svg>);
    const ImageIcon = ({ className }) => (<svg className={className} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect width="18" height="18" x="3" y="3" rx="2" ry="2"/><circle cx="9" cy="9" r="2"/><path d="m21 15-3.086-3.086a2 2 0 0 0-2.828 0L6 21"/></svg>);
    const AlertCircle = ({ className }) => (<svg className={className} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" x2="12" y1="8" y2="12"/><line x1="12" x2="12.01" y1="16" y2="16"/></svg>);
    const CheckCircle2 = ({ className }) => (<svg className={className} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10"/><path d="m9 12 2 2 4-4"/></svg>);

    // Helper for generating UUIDs safely in browser
    const generateId = () => {
      if (typeof crypto !== 'undefined' && crypto.randomUUID) {
        return crypto.randomUUID();
      }
      return Math.random().toString(36).substring(2, 15);
    };

    // --- Constants ---
    const PRESETS = [
      { name: 'Image 1 Layout (35.4x43.1)', w: 35.457, h: 43.124 },
      { name: 'Image 2 Layout (25x35)', w: 25, h: 35 },
      { name: 'Standard Passport (35x45)', w: 35, h: 45 },
      { name: 'US Passport / 2x2" (51x51)', w: 51, h: 51 },
    ];

    const BORDER_OPTIONS = [
      { label: 'NO Border', value: 0 },
      { label: '0.2mm (Hairline)', value: 0.2 },
      { label: '0.5mm', value: 0.5 },
      { label: '1.0mm', value: 1.0 },
    ];

    // --- Main Component ---
    function App() {
      const [photos, setPhotos] = useState([]);
      const [settings, setSettings] = useState({
        paperWidth: 210, // A4 width in mm
        paperHeight: 297, // A4 height in mm
        margin: 12.7, // 0.5 inches in mm
        spacingX: 2, // mm
        spacingY: 2, // mm
      });
      const [jsPdfLoaded, setJsPdfLoaded] = useState(false);
      const [isGenerating, setIsGenerating] = useState(false);
      const [toast, setToast] = useState(null);
      
      const fileInputRef = useRef(null);

      useEffect(() => {
        if (window.jspdf) {
          setJsPdfLoaded(true);
          return;
        }
        const script = document.createElement('script');
        script.src = "https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js";
        script.async = true;
        script.onload = () => setJsPdfLoaded(true);
        document.body.appendChild(script);
      }, []);

      const showToast = (message, type = 'info') => {
        setToast({ message, type });
        setTimeout(() => setToast(null), 3000);
      };

      const handleFileUpload = (e) => {
        const files = Array.from(e.target.files);
        if (!files.length) return;

        const newPhotos = files.map(file => {
          return new Promise((resolve) => {
            const reader = new FileReader();
            reader.onload = (event) => {
              resolve({
                id: generateId(),
                file: file,
                dataUrl: event.target.result,
                width: PRESETS[0].w,
                height: PRESETS[0].h,
                quantity: 1,
                fitMode: 'cover',
                borderWidth: 0 // Default to no border
              });
            };
            reader.readAsDataURL(file);
          });
        });

        Promise.all(newPhotos).then(results => {
          setPhotos(prev => [...prev, ...results]);
          if (fileInputRef.current) fileInputRef.current.value = '';
        });
      };

      const updatePhoto = (id, field, value) => {
        setPhotos(photos.map(p => p.id === id ? { ...p, [field]: value } : p));
      };

      const removePhoto = (id) => {
        setPhotos(photos.filter(p => p.id !== id));
      };

      const applyPreset = (id, preset) => {
        setPhotos(photos.map(p => p.id === id ? { ...p, width: preset.w, height: preset.h } : p));
      };

      const updateSetting = (field, value) => {
        setSettings({ ...settings, [field]: Number(value) || 0 });
      };

      const calculateLayout = () => {
        const pages = [];
        let currentPage = [];
        let currentX = settings.margin;
        let currentY = settings.margin;
        let rowHeight = 0;

        const usableWidth = settings.paperWidth - settings.margin;
        const usableHeight = settings.paperHeight - settings.margin;

        const itemsToPlace = [];
        photos.forEach(photo => {
          const qty = parseInt(photo.quantity) || 0;
          for (let i = 0; i < qty; i++) {
            itemsToPlace.push({ ...photo });
          }
        });

        itemsToPlace.forEach(item => {
          const itemW = parseFloat(item.width) || 0;
          const itemH = parseFloat(item.height) || 0;

          if (currentX + itemW > usableWidth + 0.1) {
            currentX = settings.margin;
            currentY += rowHeight + settings.spacingY;
            rowHeight = 0;
          }

          if (currentY + itemH > usableHeight + 0.1) {
            if (currentPage.length > 0) pages.push(currentPage);
            currentPage = [];
            currentX = settings.margin;
            currentY = settings.margin;
            rowHeight = 0;
          }

          currentPage.push({
            ...item,
            x: currentX,
            y: currentY,
            width: itemW,
            height: itemH
          });

          currentX += itemW + settings.spacingX;
          rowHeight = Math.max(rowHeight, itemH);
        });

        if (currentPage.length > 0) pages.push(currentPage);
        return pages;
      };

      const processImageFor900DPI = (imgUrl, targetWidthMm, targetHeightMm, fitMode = 'cover', borderWidth = 0) => {
        return new Promise((resolve) => {
          const img = new Image();
          img.onload = () => {
            const canvas = document.createElement('canvas');
            const pxPerMm = 900 / 25.4;
            canvas.width = targetWidthMm * pxPerMm;
            canvas.height = targetHeightMm * pxPerMm;
            const ctx = canvas.getContext('2d');

            ctx.fillStyle = '#FFFFFF';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            const imgRatio = img.width / img.height;
            const targetRatio = canvas.width / canvas.height;

            let drawWidth, drawHeight, offsetX = 0, offsetY = 0;

            if (fitMode === 'fill') {
              drawWidth = canvas.width;
              drawHeight = canvas.height;
            } else if (fitMode === 'contain') {
              if (imgRatio > targetRatio) {
                drawWidth = canvas.width;
                drawHeight = img.height * (drawWidth / img.width);
                offsetY = (canvas.height - drawHeight) / 2;
              } else {
                drawHeight = canvas.height;
                drawWidth = img.width * (drawHeight / img.height);
                offsetX = (canvas.width - drawWidth) / 2;
              }
            } else {
              if (imgRatio > targetRatio) {
                drawHeight = canvas.height;
                drawWidth = img.width * (drawHeight / img.height);
                offsetX = (canvas.width - drawWidth) / 2;
              } else {
                drawWidth = canvas.width;
                drawHeight = img.height * (drawWidth / img.width);
                offsetY = (canvas.height - drawHeight) / 2;
              }
            }

            ctx.imageSmoothingEnabled = true;
            ctx.imageSmoothingQuality = 'high';
            ctx.drawImage(img, offsetX, offsetY, drawWidth, drawHeight);

            // Render Physical Border
            if (borderWidth > 0) {
              const thicknessPx = borderWidth * pxPerMm;
              ctx.strokeStyle = '#000000';
              ctx.lineWidth = thicknessPx;
              // Use inset stroke logic to keep dimensions exact
              ctx.strokeRect(thicknessPx/2, thicknessPx/2, canvas.width - thicknessPx, canvas.height - thicknessPx);
            }

            resolve(canvas.toDataURL('image/jpeg', 0.95));
          };
          img.src = imgUrl;
        });
      };

      const handleExportPDF = async () => {
        if (photos.length === 0) {
          showToast("Please add at least one photo first.", "error");
          return;
        }
        
        setIsGenerating(true);
        
        try {
          const { jsPDF } = window.jspdf;
          const doc = new jsPDF({
            orientation: 'portrait',
            unit: 'mm',
            format: [settings.paperWidth, settings.paperHeight]
          });

          const pagesLayout = calculateLayout();
          const processedCache = {}; 

          for (let i = 0; i < pagesLayout.length; i++) {
            if (i > 0) doc.addPage();
            const page = pagesLayout[i];

            for (const pos of page) {
              const cacheKey = `${pos.id}_${pos.width}_${pos.height}_${pos.fitMode}_${pos.borderWidth}`;
              let highDpiDataUrl = processedCache[cacheKey];

              if (!highDpiDataUrl) {
                highDpiDataUrl = await processImageFor900DPI(pos.dataUrl, pos.width, pos.height, pos.fitMode, pos.borderWidth);
                processedCache[cacheKey] = highDpiDataUrl;
              }

              doc.addImage(highDpiDataUrl, 'JPEG', pos.x, pos.y, pos.width, pos.height);
            }
          }
          
          doc.save(`Photo_Print_Sheet_${new Date().getTime()}.pdf`);
          showToast("PDF exported successfully!", "success");
        } catch (error) {
          console.error("PDF Generation failed", error);
          showToast("Failed to generate PDF.", "error");
        } finally {
          setIsGenerating(false);
        }
      };

      const layoutPages = calculateLayout();

      return (
        <div className="min-h-screen bg-slate-100 flex flex-col md:flex-row font-sans text-slate-800">
          
          {toast && (
            <div className={`fixed top-4 right-4 z-50 flex items-center px-4 py-3 rounded-lg shadow-lg text-white ${toast.type === 'error' ? 'bg-red-500' : 'bg-emerald-600'}`}>
              {toast.type === 'error' ? <AlertCircle className="w-5 h-5 mr-2" /> : <CheckCircle2 className="w-5 h-5 mr-2" />}
              {toast.message}
            </div>
          )}

          <div className="w-full md:w-[450px] bg-white border-r border-slate-200 flex flex-col h-screen overflow-y-auto shadow-sm z-10">
            <div className="p-6 border-b border-slate-100">
              <h1 className="text-2xl font-bold text-slate-900 flex items-center">
                <ImageIcon className="mr-3 text-blue-600 w-7 h-7" />
                Pro Photo Layout
              </h1>
              <p className="text-sm text-slate-500 mt-1">Multi-size photo sheets @ 900 DPI.</p>
            </div>

            <div className="p-6 space-y-6 flex-grow">
              <section className="bg-slate-50 p-4 rounded-xl border border-slate-200">
                <h2 className="text-sm font-semibold text-slate-700 uppercase tracking-wider flex items-center mb-4">
                  <Settings className="w-4 h-4 mr-2" />
                  Page Setup (A4)
                </h2>
                <div className="grid grid-cols-2 gap-4">
                  <div>
                    <label className="block text-xs text-slate-500 mb-1">Outer Margin (mm)</label>
                    <input 
                      type="number" step="0.1"
                      value={settings.margin} 
                      onChange={(e) => updateSetting('margin', e.target.value)}
                      className="w-full bg-white border border-slate-300 rounded-md px-3 py-2 text-sm focus:ring-2 focus:ring-blue-500 focus:outline-none"
                    />
                  </div>
                  <div>
                    <label className="block text-xs text-slate-500 mb-1">Gap X / Y (mm)</label>
                    <div className="flex space-x-2">
                      <input 
                        type="number" step="0.1"
                        value={settings.spacingX} 
                        onChange={(e) => updateSetting('spacingX', e.target.value)}
                        className="w-1/2 bg-white border border-slate-300 rounded-md px-2 py-2 text-sm focus:ring-2 focus:ring-blue-500"
                      />
                      <input 
                        type="number" step="0.1"
                        value={settings.spacingY} 
                        onChange={(e) => updateSetting('spacingY', e.target.value)}
                        className="w-1/2 bg-white border border-slate-300 rounded-md px-2 py-2 text-sm focus:ring-2 focus:ring-blue-500"
                      />
                    </div>
                  </div>
                </div>
              </section>

              <section>
                <div className="flex justify-between items-center mb-4">
                  <h2 className="text-sm font-semibold text-slate-700 uppercase tracking-wider">
                    Photo Roster ({photos.length})
                  </h2>
                  <button 
                    onClick={() => fileInputRef.current?.click()}
                    className="text-sm bg-blue-50 text-blue-600 hover:bg-blue-100 px-3 py-1.5 rounded-md font-medium flex items-center"
                  >
                    <Plus className="w-4 h-4 mr-1" /> Add Photos
                  </button>
                  <input type="file" multiple accept="image/*" className="hidden" ref={fileInputRef} onChange={handleFileUpload} />
                </div>

                <div className="space-y-4">
                  {photos.map((photo, index) => (
                    <div key={photo.id} className="bg-white border border-slate-200 rounded-xl p-4 shadow-sm relative group">
                      <button onClick={() => removePhoto(photo.id)} className="absolute top-3 right-3 text-slate-400 hover:text-red-500 transition-colors">
                        <Trash2 className="w-4 h-4" />
                      </button>
                      
                      <div className="flex items-start gap-4">
                        <div className="w-20 h-24 bg-slate-100 rounded-lg overflow-hidden flex-shrink-0 border border-slate-200">
                          <img src={photo.dataUrl} alt="" className="w-full h-full object-cover" />
                        </div>
                        
                        <div className="flex-grow space-y-3">
                          <div className="flex items-center space-x-2 overflow-x-auto pb-1 no-scrollbar">
                             <span className="bg-slate-100 text-slate-600 text-[10px] px-1.5 py-0.5 rounded font-bold whitespace-nowrap uppercase">Img {index + 1}</span>
                             <select 
                              onChange={(e) => applyPreset(photo.id, PRESETS[e.target.value])}
                              className="text-[10px] border border-slate-200 rounded bg-slate-50 py-0.5 px-1 whitespace-nowrap"
                              defaultValue=""
                             >
                               <option value="" disabled>Presets...</option>
                               {PRESETS.map((p, i) => <option key={i} value={i}>{p.name}</option>)}
                             </select>
                             
                             <div className="flex items-center bg-slate-50 border border-slate-200 rounded px-1 space-x-1">
                                <span className="text-[9px] text-slate-400 font-bold uppercase">Border:</span>
                                <select 
                                  value={photo.borderWidth} 
                                  onChange={(e) => updatePhoto(photo.id, 'borderWidth', parseFloat(e.target.value))}
                                  className="text-[10px] bg-transparent font-medium focus:outline-none"
                                >
                                  {BORDER_OPTIONS.map(opt => (
                                    <option key={opt.value} value={opt.value}>{opt.label}</option>
                                  ))}
                                </select>
                             </div>
                          </div>
                          
                          <div className="grid grid-cols-2 gap-2">
                            <div>
                              <label className="block text-[10px] text-slate-500 uppercase font-semibold mb-1">W (mm)</label>
                              <input type="number" step="0.001" value={photo.width} onChange={(e) => updatePhoto(photo.id, 'width', e.target.value)} className="w-full bg-slate-50 border border-slate-200 rounded px-2 py-1.5 text-sm" />
                            </div>
                            <div>
                              <label className="block text-[10px] text-slate-500 uppercase font-semibold mb-1">H (mm)</label>
                              <input type="number" step="0.001" value={photo.height} onChange={(e) => updatePhoto(photo.id, 'height', e.target.value)} className="w-full bg-slate-50 border border-slate-200 rounded px-2 py-1.5 text-sm" />
                            </div>
                            <div>
                              <label className="block text-[10px] text-blue-600 uppercase font-semibold mb-1">Qty</label>
                              <input type="number" min="1" value={photo.quantity} onChange={(e) => updatePhoto(photo.id, 'quantity', e.target.value)} className="w-full bg-blue-50 border border-blue-200 rounded px-2 py-1.5 text-sm font-semibold" />
                            </div>
                            <div>
                              <label className="block text-[10px] text-slate-500 uppercase font-semibold mb-1">Fit</label>
                              <select value={photo.fitMode} onChange={(e) => updatePhoto(photo.id, 'fitMode', e.target.value)} className="w-full bg-slate-50 border border-slate-200 rounded px-2 py-1.5 text-xs">
                                <option value="cover">Fill (Crop)</option>
                                <option value="contain">Fit (Borders)</option>
                                <option value="fill">Stretch</option>
                              </select>
                            </div>
                          </div>
                        </div>
                      </div>
                    </div>
                  ))}
                </div>
              </section>
            </div>

            <div className="p-6 border-t border-slate-200 bg-slate-50 mt-auto">
              <button
                onClick={handleExportPDF}
                disabled={!jsPdfLoaded || isGenerating || photos.length === 0}
                className="w-full bg-blue-600 hover:bg-blue-700 disabled:bg-slate-300 text-white font-semibold py-3 px-4 rounded-xl flex items-center justify-center transition-all shadow-md active:scale-[0.98]"
              >
                {isGenerating ? "Processing 900 DPI..." : "Export PDF (900 DPI)"}
              </button>
            </div>
          </div>

          <div className="flex-1 bg-slate-200/50 overflow-y-auto p-4 md:p-8 flex flex-col items-center">
            <div className="max-w-3xl w-full mb-6 text-center md:text-left flex justify-between items-end">
              <div>
                <h2 className="text-lg font-semibold text-slate-800">Layout Preview</h2>
                <p className="text-sm text-slate-500">Pages: {layoutPages.length} | Items: {photos.reduce((sum, p) => sum + (parseInt(p.quantity) || 0), 0)}</p>
              </div>
              <div className="text-right text-xs text-slate-400 font-medium">
                900 DPI Print Precision
              </div>
            </div>

            <div className="space-y-10 w-full max-w-3xl pb-20 flex flex-col items-center">
              {layoutPages.map((page, pageIdx) => (
                <div key={pageIdx} className="relative shadow-2xl bg-white" 
                     style={{ width: '100%', maxWidth: '800px', aspectRatio: '210/297' }}>
                  
                  {/* Paper Margin Guide */}
                  <div className="absolute border border-blue-100 border-dashed pointer-events-none"
                       style={{
                         inset: `${(settings.margin / 297) * 100}% ${(settings.margin / 210) * 100}%`
                       }}
                  />

                  {page.map((pos, i) => (
                    <div key={i} className="absolute bg-slate-100 overflow-hidden box-border"
                         style={{
                           left: `${(pos.x / 210) * 100}%`,
                           top: `${(pos.y / 297) * 100}%`,
                           width: `${(pos.width / 210) * 100}%`,
                           height: `${(pos.height / 297) * 100}%`,
                           // Visual representation of chosen border
                           border: pos.borderWidth > 0 ? `${(pos.borderWidth / 210) * 800}px solid black` : 'none' 
                         }}>
                      <img 
                        src={pos.dataUrl} 
                        alt="" 
                        className={`w-full h-full ${pos.fitMode === 'contain' ? 'object-contain' : pos.fitMode === 'fill' ? 'object-fill' : 'object-cover'}`} 
                      />
                    </div>
                  ))}
                  <div className="absolute -bottom-8 w-full text-center text-sm text-slate-500 font-medium uppercase tracking-widest">
                    Page {pageIdx + 1}
                  </div>
                </div>
              ))}
            </div>
          </div>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
